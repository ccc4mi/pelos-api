  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <link rel="stylesheet" href="product.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;900&family=Nunito:wght@700&display=swap" rel="stylesheet">
    <style>
      .badge-stock { font-size: 0.85rem; padding: 0.4em 0.6em; }
    </style>
  </head>
<header>
    <nav class="navbar navbar-expand-lg p-3" style="background-color: #A8C867;">
        <div class="container">
            <a class="navbar-brand" href="index.html">
              <img src="Assets/logo/Logo.png" alt="Logo" width="30" height="24">
            </a>
          </div>
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0 ms-auto">
              <div class="nav-item dropdown">
                <a class="nav-link dropdown-toggle" style="color: white;" href="#" id="navbarDropdown" role="button" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
                  Servicios
                </a>
                <div class="dropdown-menu" aria-labelledby="navbarDropdown">
                  <a class="dropdown-item" href="perros.html">Perros</a>
                  <a class="dropdown-item" href="gatos.html">Gatos</a>
                  <a class="dropdown-item" href="conejo.html">Conejos</a>
                  <a class="dropdown-item" href="huron.html">Hurones</a>
                </div>
              </div>
              <li class="nav-item">
                <a class="nav-link active" aria-current="page" style="color: white;" href="productos.html">Productos</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" style="color: white;" href="contactanos.html">Contactanos</a>
              </li>
            </ul>
          </div>
    </nav>
</header>  
<body>
  <section class="banner">
    <div class="banner-prod">
        <img src="Assets/banners/banner prod (2).png" >
      </div>
  </section>

  <section class="texto-prod">
    <div>
       <h2>Nuestro Catálogo</h2>
    </div>
  </section>

  <!-- CATÁLOGO PÚBLICO -->
  <div class="container mt-4 mb-5">
    <div class="row" id="catalogo-container">
        <!-- Las tarjetas se inyectan acá de forma automática -->
    </div>
  </div>

  <!-- MODAL DE COMPRA -->
  <div class="modal fade" id="exampleModal" tabindex="-1" role="dialog" aria-labelledby="exampleModalLabel" aria-hidden="true">
    <div class="modal-dialog" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="exampleModalLabel">¡Gracias por su compra!</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <p>Para retirar su producto dirijase a la sucursal más cercana.</p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
                <a href="contactanos.html" class="btn text-white" style="background-color: #A8C867;">Sucursales</a>
            </div>
        </div>
    </div>
  </div>

  <!-- SCRIPTS DE DEPENDENCIAS -->
  <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.0.8/dist/umd/popper.min.js"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <!-- config.js -->
  <script src="config.js"></script>

  <!-- LÓGICA DE RENDERIZADO CON LA API -->
  <script>
    
    const API_URL = window.APP_CONFIG.PRODUCTOS_ENDPOINT;
    const API_BASE = window.APP_CONFIG.API_BASE_URL;

    document.addEventListener('DOMContentLoaded', cargarCatalogoPublico);
    
    async function cargarCatalogoPublico() {
        const container = document.getElementById('catalogo-container');
        container.innerHTML = '';

        try {
            const res = await fetch(API_URL);
            if (!res.ok) throw new Error('Error en la respuesta de la API');
            
            const productos = await res.json();

            if (productos.length === 0) {
                container.innerHTML = `<div class="col-12 text-center my-5"><p class="text-muted fs-5">Por el momento no disponemos de artículos en stock.</p></div>`;
                return;
            }

            productos.forEach(p => {
                
                const imgCompleta = `${API_BASE}/${p.imagenUrl}`;
                
                container.innerHTML += `
                    <div class="col-md-4 mb-5">
                        <div class="card h-100 d-flex flex-column shadow-sm">
                            <img class="card-img-top" src="${imgCompleta}" alt="${p.nombre}" style="width: 100%; height: 200px; object-fit: cover;">
                            <div class="card-body d-flex flex-column align-items-center justify-content-center text-center">
                                <p class="card-text mb-1" style="font-family: 'Nunito', sans-serif; font-size: 1.1rem;"><strong>${p.nombre}</strong></p>
                                <p class="text-success mb-2 fw-bold fs-5">$${p.precio.toFixed(2)}</p>
                                <div class="mb-3">
                                    <span class="badge bg-secondary badge-stock">Disponibles: ${p.stock} u.</span>
                                </div>
                                <button type="button" class="btn btn-block w-100" data-bs-toggle="modal" data-bs-target="#exampleModal">Comprar</button>
                            </div>
                        </div>
                    </div>
                `;
            });
        } catch (error) {
            console.error('Detalle del error:', error);
            container.innerHTML = `<div class="col-12 text-center my-5"><div class="alert alert-danger">Error de conexión con la tienda.</div></div>`;
        }
    }
  </script>
</body>
</html>
